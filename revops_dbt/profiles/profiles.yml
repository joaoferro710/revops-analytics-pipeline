revops_dbt:
  target: bigquery
  outputs:
    bigquery:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID', 'revops-analytics-personal') }}"
      dataset: "{{ env_var('BQ_ANALYTICS_DATASET_ID', 'revops') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      threads: 4
      timeout_seconds: 300
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
